<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clayton's Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            color: #fff;
            text-align: center;
        }
        h1 {
            margin: 60px 0 20px;
            font-size: 3rem;
        }
        .game-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .game-card {
            background: #1f1f1f;
            border-radius: 12px;
            width: 280px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .game-card:hover {
            transform: scale(1.05);
        }
        .game-card img {
            width: 100%;
            border-radius: 8px;
        }
        .game-card h2 {
            margin: 15px 0 10px;
        }
        a {
            color: #00ffcc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Clayton's Games</h1>
    <p>Welcome to my game collection!</p>

    <div class="game-container">
        <a href="backyardbombers/" class="game-card">
            <h2>🏠 Backyard Bombers</h2>
            <p>Home Run Derby Game</p>
            <p><strong>Play Now →</strong></p>
        </a>
    </div>
</body>
</html>
